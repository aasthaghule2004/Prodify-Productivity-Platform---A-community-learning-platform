{% extends 'base.html' %}
{% block content %}
<style>
    .auth-wrap {
        min-height: 72vh;
        display: grid;
        place-items: center;
    }

    .auth-card {
        width: min(420px, 100%);
        padding: 24px;
    }

    .auth-card h2 {
        margin: 0 0 16px;
    }

    .auth-card form p {
        margin: 0 0 12px;
    }

    .auth-card label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
    }

    .auth-card input {
        width: 100%;
    }

    .auth-foot {
        margin: 14px 0 0;
        color: var(--muted);
    }

    .auth-foot a {
        color: #bff9ee;
        text-decoration: none;
    }
</style>

<div class="page-wrap auth-wrap">
    <div class="panel auth-card">
        <h2>Login</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-brand" style="width: 100%;">Login</button>
        </form>
        <p class="auth-foot">
            Don't have an account? <a href="{% url 'register' %}">Register</a>
        </p>
    </div>
</div>
{% endblock %}
